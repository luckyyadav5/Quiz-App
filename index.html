<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        body{
            margin: 0;
            padding: 0;
        }

        .m-container{
            justify-content: center;
            align-items: center;
            background-color: beige;
            width: 500px;
            height: 130px;  
        }
        button{
            padding: 10px;

        }
    </style>
</head>
<body>
    <form id="form">

        <div class="m-container">
            <input style = "width: 500px; height: 50px; " type="text"  id="q-1" placeholder="Enter your first question">
            <input style = "width: 500px; height: 50px; " type ="text"  id="q-2" placeholder="Enter your second question">
            <input style = "width: 500px; height: 50px; " type="text"  id="q-3" placeholder="Enter your third question">
            <input style = "width: 500px; height: 50px; " type="text"  id="q-4" placeholder="Enter your fourth question">
            <input style = "width: 500px; height: 50px; " type="text"  id="q-5" placeholder="Enter your fifth question">
            <input style = "width: 500px; height: 50px; " type="text"  id="q-6" placeholder="Enter your sixth question">
        
            <button type="submit">ADD QUESTIONS</button>
        </div>

    </form>

    <script src="script.js"></script>
</body>
</html>
